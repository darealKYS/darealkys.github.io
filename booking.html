<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>จองคิว</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg, #bfe9ff, #ffe7a3);
}

/* 🌟 หัว */
.header {
  text-align: center;
  padding: 20px;
}

.title {
  font-size: 24px;
  font-weight: 800;
}

.sub {
  font-size: 13px;
  color: #555;
}

/* 📦 กล่อง */
.box {
  margin: 15px;
  padding: 15px;

  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);

  border-radius: 20px;

  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* 🏠 ปุ่มกลับ */
.back {
  display: block;
  margin: 10px auto;
  width: fit-content;

  padding: 10px 20px;

  border-radius: 999px;
  background: linear-gradient(135deg, #6ecbff, #ffd86b);

  text-decoration: none;
  color: #333;
  font-weight: bold;
}

/* 📅 calendar */
.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:12px; /* 🔥 เว้นห่างจาก Mon Tue */
}
#monthText{
  font-size:18px;
  font-weight:800;

  background:linear-gradient(90deg,#ff5fa2,#8fd3ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  letter-spacing:0.5px;
}

.calendar-header button{
  width:36px;
  height:36px;

  border:none;
  border-radius:50%;

  background:linear-gradient(135deg,#ff9acb,#8fd3ff);
  color:white;
  font-size:16px;

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:0 4px 12px rgba(255,105,180,0.3);
  transition:0.2s;
}

.calendar-header button:active{
  transform:scale(0.9);
}

.calendar-day{
  position: relative; /* 🔥 เพิ่มบรรทัดนี้ */
  width:42px;
  height:42px;
  border-radius:50%;
  margin-top:5px; /* เพิ่มช่องว่างด้านบนอีกนิด */

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:600;

  background:linear-gradient(145deg,#e6f4ff,#d4ecff);

  box-shadow:
    0 6px 12px rgba(0,0,0,0.08),
    inset 0 2px 6px rgba(255,255,255,0.7);

  transition:0.2s;
}

/* 🖱️ hover */
.calendar-day:hover{
  transform:scale(1.1);
  background:linear-gradient(145deg,#ffd6ec,#e6f4ff);
}

/* 👆 กด */
.calendar-day:active{
  transform:scale(0.9);
}
.calendar-day.selected{
  background:linear-gradient(135deg,#ff9acb,#8fd3ff);
  color:white;

  box-shadow:
    0 8px 20px rgba(255,105,180,0.4);
}

.calendar-day.full{
  background:#eee;
  color:#aaa;
  text-decoration:line-through;

  box-shadow:none;
}
.calendar-day.available{
  background:linear-gradient(145deg,#d4ffd9,#e6fff0);
  color:#2e7d32;
}
.calendar-day::after{
  content:"";
  position:absolute;
  bottom:6px;

  width:6px;
  height:6px;
  border-radius:50%;

  background:transparent;
}

/* 🟢 ว่าง */
.calendar-day.available::after{
  background:#4caf50;
}

/* 🔴 เต็ม */
.calendar-day.full::after{
  background:#ff5fa2;
}
.calendar-box{
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(12px);

  border-radius:30px;

  box-shadow:
    0 15px 40px rgba(0,0,0,0.1),
    inset 0 2px 8px rgba(255,255,255,0.8);
}

.calendar-nav button{
  width:40px;
  height:40px;
  border-radius:50%;
  border:none;

  background:linear-gradient(135deg,#ff9acb,#8fd3ff);
  color:white;

  box-shadow:0 6px 15px rgba(255,105,180,0.3);
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 10px;
}
.calendar-day.today{
  border:2px solid #ff9acb;
  font-weight:800;
}

/* 📦 form */
.form {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input {
  width: 100%;
  padding: 12px;

  border-radius: 12px;
  border: 1px solid #ccc;
}

.row {
  display: flex;
  gap: 10px;
}

.row input {
  flex: 1;
}

/* 🔘 ปุ่ม */
.btn {
  padding: 14px;
  border-radius: 15px;

  border: none;
  font-weight: bold;

  background: linear-gradient(135deg, #6ecbff, #ffd86b);
}

/* 📋 ปุ่มเช็คคิว (ขนาดเท่ากัน) */
.queue-btn {
  margin-top: 8px;
  padding: 14px;
  border-radius: 15px;

  text-align: center;
  text-decoration: none;

  font-weight: bold;

  background: linear-gradient(135deg, #6ecbff, #ffd86b);
  color: #333;
}
/* 🔥 เส้นคั่นวัน (Mon-Sun) */
.calendar-days {
  position: relative;
}

/* เส้น */
.calendar-days::after {
  content: "";
  position: absolute;

  left: 0;
  right: 0;
  bottom: -6px;

  height: 2px;

  background: rgba(0,0,0,0.25); /* ⭐ ปรับความเข้มตรงนี้ */
  border-radius: 2px;
}
.calendar-days{
  display:grid;
  grid-template-columns: repeat(7,1fr);
  text-align:center;
  font-weight:600;
  margin-bottom:8px;
}
.calendar-days div{
  color:#666;
  font-size:13px;
}
.calendar-day.holiday{
  background:linear-gradient(135deg,#ffd6ec,#ffe0e0);
  color:#ff5fa2;

  box-shadow:none;
}

.calendar-day.holiday::after{
  background:#ff5fa2;
}
</style>
</head>

<body>

<!-- 🔥 HEADER กลับมาแล้ว -->
<div class="header">
  <div class="title">🌤 จองคิว Commission</div>
  <div class="sub">— By Claire —</div>
</div>

<a href="index.html" class="back">🏠 กลับหน้าหลัก</a>

<!-- 📅 CALENDAR -->
<div class="box calendar-box">

<div class="calendar-header">
  <button onclick="changeMonth(-1)">‹</button>
  <div id="monthText"></div>
  <button onclick="changeMonth(1)">›</button>
</div>

<div class="calendar-days">
  <div>Mon</div><div>Tue</div><div>Wed</div>
  <div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
</div>

<div id="calendar" class="calendar-grid"></div>

</div>

<!-- 📦 FORM -->
<div class="box form">

<input id="customer" placeholder="ชื่อลูกค้า">
<input id="fandom" placeholder="ชื่อด้อม">

<div class="row">
  <input id="type" placeholder="ประเภทงาน">
  <input id="amount" type="number" placeholder="จำนวน">
</div>

<input id="date" type="date">

<button class="btn" onclick="addTask()">จองคิว</button>

<a href="queue.html" class="queue-btn">📋 เช็คคิว</a>

</div>

<script>
let currentDate = new Date();

function renderCalendar() {
  const calendar = document.getElementById("calendar");
  const monthText = document.getElementById("monthText");

  calendar.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  const months = ["January","February","March","April","May","June",
  "July","August","September","October","November","December"];

  monthText.textContent = months[month] + " " + year;

  const days = new Date(year, month+1, 0).getDate();
  const firstDay = (new Date(year,month,1).getDay()+6)%7;

  /* 🔥 เว้นช่องก่อนวันแรก */
  for(let i=0;i<firstDay;i++){
    calendar.appendChild(document.createElement("div"));
  }

  /* 🔥 สร้างวัน */
  for(let i=1;i<=days;i++){
    const d = document.createElement("div");
    d.className = "calendar-day";
    d.textContent = i;

    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

    /* 📍 วันนี้ */
    const today = new Date();
    if(
      i === today.getDate() &&
      month === today.getMonth() &&
      year === today.getFullYear()
    ){
      d.classList.add("today");
    }

    /* 🟢 ว่าง */
    if([1,2,3,4,5].includes(i)){
      d.classList.add("available");
    }

    /* 🔴 เต็ม */
    if([10,15,20].includes(i)){
      d.classList.add("full");
    }
    
    /* 🔴 วันหยุดสงกรานต์ */
if([13,14,15,16].includes(i)){
  d.classList.add("holiday");
}

    /* 👉 click */
    d.onclick = ()=>{
  if(d.classList.contains("full")){
    alert("วันนี้คิวเต็มแล้วนะ 💖");
    return;
  }

  if(d.classList.contains("holiday")){
    alert("หยุดสงกรานต์ ไม่รับคิวจ้า 🌸");
    return;
  }

  /* 🔥 ล้าง selection */
  document.querySelectorAll(".calendar-day")
    .forEach(x=>x.classList.remove("selected"));

  /* 🎯 เลือกวัน */
  d.classList.add("selected");
  document.getElementById("date").value = dateStr;
};

    calendar.appendChild(d);
}

/* 🔥 ปิด function ตรงนี้ */
}
/* 🔁 เปลี่ยนเดือน */
function changeMonth(n){
  currentDate.setMonth(currentDate.getMonth()+n);
  renderCalendar();
}

/* 📩 ปุ่มจอง */
function addTask(){
  const name = document.getElementById("customer").value;
  const date = document.getElementById("date").value;

  if(!name || !date){
    alert("กรอกข้อมูลก่อน!");
    return;
  }

  alert("จองสำเร็จ 🎉");
}

/* 🚀 โหลดครั้งแรก */
renderCalendar();
</script>

</body>
</html>
